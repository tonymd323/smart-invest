version: "3.8"

services:
  smart-invest:
    build: .
    image: smart-invest:latest
    container_name: smart-invest
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data      # SQLite DB + 配置数据
      - ./config:/app/config   # stocks.json
    environment:
      - PYTHONUNBUFFERED=1
      - TUSHARE_TOKEN=54c6afc7620641d1611663eb05a9538c6a5b1b4cbd9e0151afdacbd2
    restart: unless-stopped
