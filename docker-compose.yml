version: "3.8"

services:
  smart-invest:
    build: .
    image: smart-invest:latest
    container_name: smart-invest
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data      # SQLite DB + 配置数据 + crontab
      - ./config:/app/config   # stocks.json
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Shanghai
      - TUSHARE_TOKEN=54c6afc7620641d1611663eb05a9538c6a5b1b4cbd9e0151afdacbd2
      # 飞书推送凭证（HTTP API 直发）
      - FEISHU_APP_ID=cli_a92e5d71f2799bdb
      - FEISHU_APP_SECRET=i4OkFLYNfu8sTqDtvQo1Bd8sJ7FeUQUp
      # 推送目标
      - SI_FEISHU_DAILY_TARGET=oc_0b6ecc5a6fdd9246b88415267dbc3224
      - SI_FEISHU_ALERT_TARGET=ou_5e001757460aaacd5e22857be92d4743
    dns:
      - 223.5.5.5
      - 114.114.114.114
    restart: unless-stopped
