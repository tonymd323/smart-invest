version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./scripts:/app/scripts
      - ./core:/app/core
      - ./web:/app/web
      - ./scanners:/app/scanners
    restart: unless-stopped
    command: python3 web/main.py
