<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}投资系统 2.2{% endblock %}</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
    <!-- 自定义 -->
    <link rel="stylesheet" href="/static/style.css">
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 侧边栏 -->
    <nav class="fixed top-0 left-0 h-full w-56 bg-gray-900 text-gray-300 flex flex-col z-50">
        <div class="p-4 border-b border-gray-700">
            <h1 class="text-xl font-bold text-white">📊 投资系统 2.2</h1>
            <p class="text-xs text-gray-500 mt-1">Smart Invest Dashboard</p>
        </div>
        <div class="flex-1 py-4">
            <a href="/" class="nav-item {% if active == 'dashboard' %}active{% endif %}">
                🏠 总览
            </a>
            <a href="/action" class="nav-item {% if active == 'action' %}active{% endif %}">
                📌 今日行动
            </a>
            <a href="/signals" class="nav-item {% if active == 'signals' %}active{% endif %}">
                📋 信号看板
            </a>
            <a href="/discovery" class="nav-item {% if active == 'discovery' %}active{% endif %}">
                🔍 发现池
            </a>
            <a href="/events" class="nav-item {% if active == 'events' %}active{% endif %}">
                📰 事件流
            </a>
            <a href="/tracking" class="nav-item {% if active == 'tracking' %}active{% endif %}">
                📈 T+N 跟踪
            </a>
            <a href="/backtest" class="nav-item {% if active == 'backtest' %}active{% endif %}">
                📊 策略回测
            </a>
            <a href="/system" class="nav-item {% if active == 'system' %}active{% endif %}">
                ⚙️ 系统控制
            </a>
        </div>
        <div class="p-4 border-t border-gray-700 text-xs text-gray-500">
            <div>{{ db_stats.db_size_mb }}MB</div>
            <div>{{ db_stats.earnings }} earnings</div>
            <div class="mt-1" id="server-time">{{ now }}</div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="ml-56 p-6">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}

    <script>
        // 更新服务器时间
        setInterval(() => {
            const el = document.getElementById('server-time');
            if (el) el.textContent = new Date().toLocaleString('zh-CN');
        }, 1000);
    </script>
</body>
</html>
